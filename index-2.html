<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF6B6B" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>🛒 Panier Commun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet" />

  <style>
    :root {
      --orange: #FF6B6B;
      --orange2: #FF8E53;
      --yellow: #FFC300;
      --green: #51CF66;
      --blue: #339AF0;
      --purple: #7B61FF;
      --bg: #FFF9F0;
      --white: #FFFFFF;
      --text: #2D2D2D;
      --muted: #AAA;
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }
    input, select, button { font-family: 'Nunito', sans-serif; }
    input:focus, select:focus { outline: none; }
    button:active { transform: scale(0.96); }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; min-height: 100dvh; }
    .screen.active { display: flex; }

    /* ── HOME ── */
    #screen-home {
      background: linear-gradient(160deg, #FFF9F0 0%, #FFF0F5 50%, #F0F4FF 100%);
      align-items: center; justify-content: center; padding: 32px 24px;
    }
    .home-hero { text-align: center; margin-bottom: 36px; animation: fadeUp 0.5s ease; }
    .home-cart { font-size: 72px; margin-bottom: 8px; display: block; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .home-title { font-family: 'Pacifico', cursive; font-size: 34px; background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFC300); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .home-sub { color: #999; font-size: 15px; font-weight: 700; margin-top: 6px; }
    .home-card { width: 100%; max-width: 360px; background: white; border-radius: 28px; padding: 28px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); animation: fadeUp 0.6s ease 0.1s both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .field-label { font-size: 11px; font-weight: 900; color: #BBB; text-transform: uppercase; letter-spacing: 1.2px; display: block; margin-bottom: 8px; }
    .text-input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 2px solid #F0F0F0; font-size: 16px; font-weight: 700; background: #FAFAFA; transition: border-color 0.2s; color: var(--text); }
    .text-input:focus { border-color: var(--orange); background: white; }
    .btn-primary { width: 100%; padding: 16px; border-radius: 18px; border: none; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 20px rgba(255,107,107,0.4); transition: all 0.2s; }
    .btn-secondary { width: 100%; padding: 16px; border-radius: 18px; border: none; background: linear-gradient(135deg, #339AF0, #7B61FF); color: white; font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 20px rgba(51,154,240,0.35); transition: all 0.2s; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: #DDD; font-size: 13px; font-weight: 800; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#EEE; }
    .code-input { text-align: center; letter-spacing: 4px; font-size: 20px; font-weight: 900; text-transform: uppercase; }
    .error-box { background: #FFF0F0; color: #FF4444; border-radius: 12px; padding: 10px 14px; font-size: 13px; font-weight: 700; margin-bottom: 14px; display: none; }
    .error-box.show { display: block; }

    /* ── LOADING ── */
    #screen-loading { align-items: center; justify-content: center; background: var(--bg); }
    .spinner { width: 44px; height: 44px; border: 4px solid #FFE0D0; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── LIST ── */
    #screen-list { background: var(--bg); }
    .list-header { background: linear-gradient(135deg, #FF6B6B, #FF8E53); padding: 48px 20px 18px; color: white; position: sticky; top: 0; z-index: 50; }
    .header-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .header-title { font-family: 'Pacifico', cursive; font-size: 22px; line-height: 1; }
    .header-user { font-size: 13px; opacity: 0.85; font-weight: 700; margin-top: 4px; }
    .code-badge { background: rgba(255,255,255,0.25); border-radius: 12px; padding: 8px 14px; text-align: center; cursor: pointer; }
    .code-badge-label { font-size: 11px; opacity: 0.8; font-weight: 700; margin-bottom: 2px; }
    .code-badge-value { font-size: 16px; font-weight: 900; letter-spacing: 3px; }
    .progress-bar { background: rgba(255,255,255,0.25); border-radius: 20px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: white; border-radius: 20px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .progress-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; opacity: 0.85; font-weight: 700; }

    /* Filters */
    .filters { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; background: white; border-bottom: 1px solid #F5F5F5; flex-shrink: 0; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: none; background: #F5F5F5; color: #777; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .filter-btn.active { background: var(--orange); color: white; box-shadow: 0 4px 12px rgba(255,107,107,0.35); }

    /* Items */
    .list-body { flex: 1; padding: 12px 16px 120px; overflow-y: auto; }
    .section-title { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #CCC; margin: 16px 0 10px; }
    .item-card { background: white; border-radius: 18px; padding: 14px 14px 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .item-card:active { transform: scale(0.98); }
    .item-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
    .item-check { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid #EEE; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .item-check.checked { background: var(--green); border-color: var(--green); color: white; font-size: 14px; font-weight: 900; }
    .item-emoji { font-size: 26px; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 15px; font-weight: 800; color: var(--text); }
    .item-meta { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 3px; }
    .item-done .item-name { text-decoration: line-through; color: #CCC; }
    .item-done .item-meta { color: #DDD; }
    .item-del { width: 32px; height: 32px; border-radius: 10px; border: none; background: #FFF0F0; color: #FF6B6B; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }

    /* Empty */
    .empty { text-align: center; padding: 60px 20px; color: #CCC; }
    .empty-icon { font-size: 60px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; font-weight: 700; }
    .empty-sub { font-size: 14px; margin-top: 6px; }

    /* FAB */
    .fab { position: fixed; bottom: 28px; right: 20px; width: 62px; height: 62px; border-radius: 50%; border: none; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; font-size: 30px; cursor: pointer; box-shadow: 0 8px 28px rgba(255,107,107,0.55); display: flex; align-items: center; justify-content: center; z-index: 100; transition: all 0.2s; }
    .fab:active { transform: scale(0.92) !important; }

    /* Clear done btn */
    .clear-btn { width: 100%; padding: 12px; border-radius: 14px; border: 2px dashed #DDD; background: transparent; color: #BBB; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 6px; }

    /* ── MODAL ADD ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(3px); }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { width: 100%; max-width: 430px; background: white; border-radius: 28px 28px 0 0; padding: 12px 20px calc(32px + env(safe-area-inset-bottom, 0px)); transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: #EEE; border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-weight: 900; font-size: 20px; margin-bottom: 18px; color: var(--text); }
    .emoji-trigger { padding: 10px 18px; border-radius: 14px; border: 2px solid #F0F0F0; background: white; font-size: 24px; cursor: pointer; transition: border-color 0.2s; }
    .emoji-trigger:focus { border-color: var(--orange); }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; background: #FAF9F7; border-radius: 16px; margin-top: 8px; max-height: 160px; overflow-y: auto; }
    .emoji-opt { font-size: 24px; padding: 6px 8px; border-radius: 10px; border: none; background: transparent; cursor: pointer; transition: background 0.15s; }
    .emoji-opt.selected { background: #FFE8E8; }
    .row2 { display: flex; gap: 12px; }
    .row2 > div { flex: 1; }
    .select-input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 2px solid #F0F0F0; font-size: 14px; font-weight: 700; background: white; color: var(--text); transition: border-color 0.2s; }
    .select-input:focus { border-color: var(--orange); }
    .mb14 { margin-bottom: 14px; }
    .mt16 { margin-top: 16px; }

    /* ── TOAST ── */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-16px); background: #222; color: white; padding: 12px 22px; border-radius: 30px; font-size: 14px; font-weight: 700; z-index: 999; opacity: 0; pointer-events: none; transition: all 0.3s; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── COPY HINT ── */
    .copy-hint { font-size: 11px; opacity: 0.75; margin-top: 4px; font-weight: 600; }
  </style>
</head>
<body>

<!-- SCREEN: HOME -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <span class="home-cart">🛒</span>
    <div class="home-title">Panier Commun</div>
    <div class="home-sub">La liste de courses en duo 💑</div>
  </div>

  <div class="home-card">
    <div class="mb14">
      <label class="field-label">Ton prénom</label>
      <input id="name-input" class="text-input" type="text" placeholder="Ex: Sophie 😊" maxlength="20" autocomplete="off" />
    </div>

    <div id="home-error" class="error-box"></div>

    <button class="btn-primary mb14" onclick="createList()">🆕 Créer une nouvelle liste</button>

    <div class="divider">ou rejoindre</div>

    <div class="mb14">
      <label class="field-label">Code de la liste</label>
      <input id="code-input" class="text-input code-input" type="text" placeholder="AB12CD" maxlength="6" autocomplete="off" />
    </div>

    <button class="btn-secondary" onclick="joinList()">🔗 Rejoindre la liste</button>
  </div>

  <div style="margin-top:20px;color:#BBB;font-size:13px;font-weight:700;text-align:center;">
    Synchronisation en temps réel 🔄
  </div>
</div>

<!-- SCREEN: LOADING -->
<div id="screen-loading" class="screen">
  <div class="spinner"></div>
  <div style="margin-top:16px;font-size:14px;font-weight:700;color:#BBB;">Connexion...</div>
</div>

<!-- SCREEN: LIST -->
<div id="screen-list" class="screen">
  <div class="list-header">
    <div class="header-row">
      <div>
        <div class="header-title">🛒 Panier Commun</div>
        <div class="header-user" id="header-user">Bonjour !</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="code-badge" onclick="copyCode()">
          <div class="code-badge-label">Code &agrave; partager</div>
          <div class="code-badge-value" id="header-code">------</div>
          <div class="copy-hint">Appuie pour copier</div>
        </div>
        <button onclick="disconnect()" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:11px;font-weight:800;padding:5px 10px;border-radius:10px;cursor:pointer;font-family:inherit;">🚪 Changer</button>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-labels">
      <span id="done-label">0 cochés</span>
      <span id="total-label">0 articles</span>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">🧾 Tous</button>
    <button class="filter-btn" data-filter="fruits" onclick="setFilter('fruits',this)">🍎 Fruits</button>
    <button class="filter-btn" data-filter="viande" onclick="setFilter('viande',this)">🥩 Viande</button>
    <button class="filter-btn" data-filter="frais" onclick="setFilter('frais',this)">🧀 Frais</button>
    <button class="filter-btn" data-filter="epicerie" onclick="setFilter('epicerie',this)">🥫 Épicerie</button>
    <button class="filter-btn" data-filter="boissons" onclick="setFilter('boissons',this)">🥤 Boissons</button>
    <button class="filter-btn" data-filter="hygiene" onclick="setFilter('hygiene',this)">🧴 Hygiène</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">✅ Cochés</button>
  </div>

  <div class="list-body" id="list-body"></div>

  <button class="fab" onclick="openAdd()">+</button>
</div>

<!-- MODAL: ADD ITEM -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Ajouter un article</div>

    <div class="mb14">
      <label class="field-label">Icône</label>
      <button class="emoji-trigger" id="emoji-trigger" onclick="toggleEmojis()">🛍️</button>
      <div id="emoji-grid" class="emoji-grid" style="display:none"></div>
    </div>

    <div class="mb14">
      <label class="field-label">Nom du produit</label>
      <input id="item-name" class="text-input" type="text" placeholder="Ex: Tomates cerises…" maxlength="50" autocomplete="off" />
    </div>

    <div class="row2 mb14">
      <div>
        <label class="field-label">Quantité</label>
        <input id="item-qty" class="text-input" type="text" value="1" maxlength="8" autocomplete="off" />
      </div>
      <div>
        <label class="field-label">Catégorie</label>
        <select id="item-cat" class="select-input">
          <option value="fruits">🍎 Fruits & Légumes</option>
          <option value="viande">🥩 Viande & Poisson</option>
          <option value="frais">🧀 Produits frais</option>
          <option value="epicerie">🥫 Épicerie</option>
          <option value="boissons">🥤 Boissons</option>
          <option value="hygiene">🧴 Hygiène</option>
          <option value="autre" selected>🛍️ Autre</option>
        </select>
      </div>
    </div>

    <button class="btn-primary mt16" onclick="addItem()">✅ Ajouter à la liste</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  // 🔧 REMPLACE CES VALEURS PAR CELLES DE TON PROJET FIREBASE
  // Va sur https://console.firebase.google.com → crée un projet → ajoute une app web
  // Copie ta firebaseConfig ici :
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAjbpUDc-xMs136zESzF4sFO1SDwBH6g_A",
    authDomain: "liste-de-courses-cfa36.firebaseapp.com",
    databaseURL: "https://liste-de-courses-cfa36-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liste-de-courses-cfa36",
    storageBucket: "liste-de-courses-cfa36.firebasestorage.app",
    messagingSenderId: "167756688973",
    appId: "1:167756688973:web:73e686f8f66a00aaddb604"
  };
  // ────────────────────────────────────────────────────────────────────────

  const EMOJIS = ["🍎","🥦","🥕","🍋","🍇","🧅","🍓","🥑","🌽","🥩","🐟","🍗","🧀","🥚","🥛","🧈","🍞","🥫","🍝","🍚","🥤","🧃","🍺","☕","🧴","🧹","🛁","🧺","🍫","🍪","🥜","🫙","🧻","🍷","🛍️"];
  const CAT_COLORS = { fruits:"#51CF66", viande:"#FF6B6B", frais:"#FFC300", epicerie:"#FF8E53", boissons:"#339AF0", hygiene:"#CC5DE8", autre:"#868E96" };

  let db, listCode, userName, currentFilter = "all", selectedEmoji = "🛍️", unsubscribe = null;

  // ── SESSION PERSISTENCE ──────────────────────────────────────────────────
  function saveSession() { localStorage.setItem("pc_name", userName); localStorage.setItem("pc_code", listCode); }
  function clearSession() { localStorage.removeItem("pc_name"); localStorage.removeItem("pc_code"); }

  // ── FIREBASE INIT ────────────────────────────────────────────────────────
  async function initFirebase() {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getDatabase, ref, set, onValue, update, remove, push, get } =
      await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

    const app = initializeApp(FIREBASE_CONFIG);
    db = { database: getDatabase(app), ref, set, onValue, update, remove, push, get };
  }

  // ── SCREENS ──────────────────────────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  // ── CREATE ────────────────────────────────────────────────────────────────
  async function createList() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { showError("Entre ton prénom !"); return; }
    show('loading');
    try {
      await initFirebase();
      listCode = Math.random().toString(36).substring(2,8).toUpperCase();
      userName = name;
      const r = db.ref(db.database, `lists/${listCode}`);
      await db.set(r, { createdAt: Date.now(), createdBy: name, items: {} });
      enterList();
    } catch(e) { showError("Erreur de connexion. Vérifie ta config Firebase."); show('home'); }
  }

  // ── JOIN ──────────────────────────────────────────────────────────────────
  async function joinList() {
    const name = document.getElementById('name-input').value.trim();
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (!name) { showError("Entre ton prénom !"); return; }
    if (!code || code.length !== 6) { showError("Entre un code à 6 caractères !"); return; }
    show('loading');
    try {
      await initFirebase();
      const r = db.ref(db.database, `lists/${code}`);
      const snap = await db.get(r);
      if (!snap.exists()) { showError("Code introuvable ! Vérifie avec ton partenaire."); show('home'); return; }
      listCode = code;
      userName = name;
      enterList();
    } catch(e) { showError("Erreur de connexion. Vérifie ta config Firebase."); show('home'); }
  }

  // ── ENTER LIST ────────────────────────────────────────────────────────────
  function enterList() {
    document.getElementById('header-user').textContent = `Bonjour ${userName} 👋`;
    document.getElementById('header-code').textContent = listCode;
    show('list');
    // Real-time listener
    if (unsubscribe) unsubscribe();
    const r = db.ref(db.database, `lists/${listCode}/items`);
    unsubscribe = db.onValue(r, snap => {
      const data = snap.val() || {};
      renderList(data);
    });
    saveSession();
    toast("🎉 Connecté !");
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function renderList(itemsObj) {
    const items = Object.entries(itemsObj).map(([id, v]) => ({ id, ...v }));
    items.sort((a, b) => (a.addedAt || 0) - (b.addedAt || 0));

    const done = items.filter(i => i.done).length;
    const total = items.length;
    document.getElementById('done-label').textContent = `${done} cochés`;
    document.getElementById('total-label').textContent = `${total} articles`;
    document.getElementById('progress-fill').style.width = total ? `${(done/total)*100}%` : '0%';

    let filtered;
    if (currentFilter === 'all') filtered = items;
    else if (currentFilter === 'done') filtered = items.filter(i => i.done);
    else filtered = items.filter(i => i.cat === currentFilter);

    const pending = filtered.filter(i => !i.done);
    const doneItems = filtered.filter(i => i.done);

    const body = document.getElementById('list-body');
    if (items.length === 0) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">🛍️</div><div class="empty-text">La liste est vide !</div><div class="empty-sub">Appuie sur + pour ajouter</div></div>`;
      return;
    }

    let html = '';
    if (pending.length > 0) {
      html += `<div class="section-title">À acheter · ${pending.length}</div>`;
      pending.forEach(item => html += itemHTML(item, false));
    }
    if (doneItems.length > 0) {
      html += `<div class="section-title" style="margin-top:${pending.length?'20px':'0'}">Dans le panier · ${doneItems.length}</div>`;
      doneItems.forEach(item => html += itemHTML(item, true));
      if (currentFilter !== 'done') {
        html += `<button class="clear-btn" onclick="clearDone()">🧹 Supprimer les articles cochés</button>`;
      }
    }
    body.innerHTML = html;
  }

  function itemHTML(item, done) {
    const color = CAT_COLORS[item.cat] || CAT_COLORS.autre;
    return `
      <div class="item-card ${done ? 'item-done' : ''}" onclick="toggleItem('${item.id}')">
        <div class="item-stripe" style="background:${color}"></div>
        <div class="item-check ${done ? 'checked' : ''}">${done ? '✓' : ''}</div>
        <div class="item-emoji">${item.emoji || '🛍️'}</div>
        <div class="item-info">
          <div class="item-name">${escHtml(item.name)}</div>
          <div class="item-meta">Qté : ${item.qty} · Par ${item.addedBy}</div>
        </div>
        <button class="item-del" onclick="event.stopPropagation();deleteItem('${item.id}')">✕</button>
      </div>`;
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── ACTIONS ───────────────────────────────────────────────────────────────
  async function toggleItem(id) {
    const r = db.ref(db.database, `lists/${listCode}/items/${id}`);
    const snap = await db.get(r);
    if (snap.exists()) await db.update(r, { done: !snap.val().done });
  }

  async function deleteItem(id) {
    await db.remove(db.ref(db.database, `lists/${listCode}/items/${id}`));
    toast("🗑️ Supprimé");
  }

  async function clearDone() {
    const r = db.ref(db.database, `lists/${listCode}/items`);
    const snap = await db.get(r);
    if (!snap.exists()) return;
    const updates = {};
    Object.entries(snap.val()).forEach(([id, v]) => { if (v.done) updates[id] = null; });
    await db.update(r, updates);
    toast("🧹 Articles cochés supprimés");
  }

  // ── ADD ITEM ──────────────────────────────────────────────────────────────
  function openAdd() {
    document.getElementById('item-name').value = '';
    document.getElementById('item-qty').value = '1';
    document.getElementById('item-cat').value = 'autre';
    selectedEmoji = '🛍️';
    document.getElementById('emoji-trigger').textContent = '🛍️';
    document.getElementById('emoji-grid').style.display = 'none';
    buildEmojiGrid();
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('item-name').focus(), 400);
  }

  function closeAdd() { document.getElementById('modal-overlay').classList.remove('open'); }

  function handleOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeAdd(); }

  function buildEmojiGrid() {
    const grid = document.getElementById('emoji-grid');
    grid.innerHTML = EMOJIS.map(e =>
      `<button class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="pickEmoji('${e}')">${e}</button>`
    ).join('');
  }

  function toggleEmojis() {
    const g = document.getElementById('emoji-grid');
    g.style.display = g.style.display === 'none' ? 'flex' : 'none';
  }

  function pickEmoji(e) {
    selectedEmoji = e;
    document.getElementById('emoji-trigger').textContent = e;
    document.getElementById('emoji-grid').style.display = 'none';
    buildEmojiGrid();
  }

  async function addItem() {
    const name = document.getElementById('item-name').value.trim();
    if (!name) { toast("⚠️ Entre un nom de produit"); return; }
    const item = {
      name, qty: document.getElementById('item-qty').value || '1',
      cat: document.getElementById('item-cat').value,
      emoji: selectedEmoji, done: false,
      addedBy: userName, addedAt: Date.now()
    };
    await db.push(db.ref(db.database, `lists/${listCode}/items`), item);
    closeAdd();
    toast("✅ Ajouté !");
  }

  // ── FILTER ────────────────────────────────────────────────────────────────
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── COPY CODE ─────────────────────────────────────────────────────────────
  function copyCode() {
    if (navigator.clipboard) navigator.clipboard.writeText(listCode).then(() => toast("📋 Code copié !"));
    else toast(`Code : ${listCode}`);
  }

  // ── UTILS ─────────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('home-error');
    el.textContent = '⚠️ ' + msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── DISCONNECT ───────────────────────────────────────────────────────────
  function disconnect() {
    if (unsubscribe) unsubscribe();
    clearSession();
    listCode = null; userName = null;
    show('home');
    toast("👋 Déconnecté");
  }

  // ── RESTORE SESSION AU DÉMARRAGE ─────────────────────────────────────────
  async function restoreSession() {
    const savedName = localStorage.getItem('pc_name');
    const savedCode = localStorage.getItem('pc_code');
    if (savedName && savedCode) {
      show('loading');
      try {
        await initFirebase();
        const r = db.ref(db.database, `lists/${savedCode}`);
        const snap = await db.get(r);
        if (snap.exists()) {
          listCode = savedCode;
          userName = savedName;
          enterList();
          return;
        }
      } catch(e) {}
      clearSession();
      show('home');
    }
  }
  restoreSession();

  // Enter key on add modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) addItem();
  });
</script>
</body>
</html>
